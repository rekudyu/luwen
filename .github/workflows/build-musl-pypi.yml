name: Build 🐍 📦 musllinux wheels (Docker)

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        default: ${{ github.ref }}
        required: false
        type: string

jobs:
  build-py-version-specific:
    name: Build musllinux wheels (Py3.8–3.10) 📦
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-tags: true
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build in musllinux Docker (x86_64)
        run: |
          set -eux
          IMAGE="quay.io/pypa/musllinux_1_1_x86_64"
          PYVER="${{ matrix.python-version }}"
          case "$PYVER" in
            "3.8") CP="cp38-cp38" ;;
            "3.9") CP="cp39-cp39" ;;
            "3.10") CP="cp310-cp310" ;;
            *) echo "Unsupported version $PYVER"; exit 1 ;;
          esac

          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            "$IMAGE" \
            /bin/sh -eux -c "
              apk add --no-progress --update \
                rust cargo clang llvm musl-dev build-base \
                pkgconfig openssl openssl-dev libffi-dev \
                ca-certificates curl git unzip \
                protobuf-dev protoc \
                python3 py3-pip

              # Prefer the prebuilt CPython from /opt/python if present
              if [ -x /opt/python/${CP}/bin/python ]; then
                PYBIN=/opt/python/${CP}/bin/python
              else
                PYBIN=\$(command -v python3)
              fi

              \$PYBIN -m pip install -U pip maturin

              protoc --version

              maturin build \
                --release \
                --out dist \
                -m crates/pyluwen/Cargo.toml \
                --interpreter \${PYBIN} \
                --target x86_64-unknown-linux-musl \
                --compatibility musllinux_1_1

              # Ensure artifacts are visible to the host
              chown -R \$(stat -c %u /work):\$(stat -c %g /work) dist || true
              ls -l dist
            "

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: python-package-musllinux-py${{ matrix.python-version }}
          path: dist/*.whl

  build-py-abi3:
    name: Build musllinux abi3 wheel (Py3.11+) 📦
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-tags: true
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build abi3 in musllinux Docker (x86_64)
        run: |
          set -eux
          IMAGE="quay.io/pypa/musllinux_1_1_x86_64"

          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            "$IMAGE" \
            /bin/sh -eux -c "
              apk add --no-progress --update \
                rust cargo clang llvm musl-dev build-base \
                pkgconfig openssl openssl-dev libffi-dev \
                ca-certificates curl git unzip \
                protobuf-dev protoc \
                python3 py3-pip

              PYBIN=\$(command -v python3)
              \$PYBIN -m pip install -U pip maturin build

              protoc --version

              maturin build \
                --release \
                --sdist \
                --out dist \
                -m crates/pyluwen/Cargo.toml \
                --features abi3-py311 \
                --target x86_64-unknown-linux-musl \
                --compatibility musllinux_1_1

              chown -R \$(stat -c %u /work):\$(stat -c %g /work) dist || true
              ls -l dist
            "

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: python-package-musllinux-abi3
          path: dist/*
